settings:
  float: '[-+]?[0-9]*\.?[0-9]+(?:[eE][-+]?[0-9]+)?'
  percentage: '[0-9]*\.?[0-9]+([eE][-+]?[0-9]+)?%'
  text: '[^;|\t\r\n]+'
subsets:
  jgi_isolate:
    description: >-
      Slots originating from the JGI Isolate (NA) v19 submission form that are not
      already captured by MIxS or other existing standards. These slots support
      organism identity, strain verification, purity assessment, and biosafety
      classification for cultured isolate submissions to JGI.
    see_also:
      - https://github.com/microbiomedata/nmdc-schema/issues/2803
    comments:
      - >-
        Mirrors the jgi_isolate subset defined in nmdc-schema basic_slots.yaml.
        Imported slots (e.g. organism_genus) carry in_subset: jgi_isolate, so the
        subset must be declared here for downstream LinkML generators to resolve it.
  nmdc_env_triad_enums:
    todos:
      - replace membership in this subset with mappings between the individual environmental triad/context enums and the EnvO subProperties
    see_also:
      - https://github.com/EnvironmentOntology/envo/blob/1598-try-creating-the-new-see_also-from-pr-1597-with-protege-564/src/envo/envo-edit.owl
      - http://purl.obolibrary.org/obo/ENVO_03605010
