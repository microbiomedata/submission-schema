  IsolateInterface:
    annotations:
      excel_worksheet_name: Isolate
    description: >-
      Metadata for microbial isolate samples submitted to NMDC. Captures core
      biological identity slots (taxonomy, strain, culture collection) that NMDC
      stores and queries. Slots are sourced from nmdc-schema OrganismSample and
      Organism classes; depends on nmdc-schema PR #2977 and #2975 merging.
    title: Isolate
    is_a: DhInterface
    mixins:
      - DhMultiviewCommonColumnsMixin
    slot_usage:
      # analysis_type has no valid enum value for isolate WGS; suppress until AnalysisTypeEnum is updated in nmdc-schema
      analysis_type:
        required: false
      estimated_size:
        title: Estimated genome size (Mb)
        unit:
          ucum_code: Mbase
      # JGI requires all three date components; full YYYY-MM-DD is mandatory here.
      # Export layer splits into JGI columns: Collection Year / Collection Month (full name) / Collection Day.
      collection_date:
        comments:
          - Use the date the sample was collected from its natural habitat, not the
            date of purchase or culturing. Full date (YYYY-MM-DD) is required.
        examples:
          - value: "2017-01-20"
          - value: "2013-03-25"
        aliases:
          - Collection Year
          - Collection Month
          - Collection Day
        pattern: ^[12]\d{3}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01])$

  JgiIsolateInterface:
    annotations:
      excel_worksheet_name: JGI Isolate
    description: >-
      JGI-specific submission metadata for isolate sequencing projects. Captures
      physical sample logistics, strain verification sequences, and QC fields
      required by JGI but not stored in nmdc-schema.
    title: JGI Isolate
    is_a: DhInterface
    mixins:
      - DhMultiviewCommonColumnsMixin
    slots:
      ## reused JGI logistics slots (already defined in base YAML)
      - replicate_group
      - jgi_samp_id
      - jgi_sample_name
      - jgi_seq_project
      - jgi_seq_project_name
      - jgi_sample_contact
      - jgi_project_pi
      - jgi_proposal_id
      - nuc_acid_absorb1
      - nuc_acid_absorb2
      - nuc_acid_concentration
      - jgi_sample_volume
      - cont_type
      - cont_well
      - container_name
      - jgi_sample_format
      - dnase
      - biosafety_mat_cat
      - dna_isolate_meth
      ## isolate-specific JGI-only slots
      - isolate_single_colony
      - isolate_known_contaminants
      - isolate_ribosomal_seq
      - isolate_ribosomal_seq_type
      - isolate_ribosomal_seq_comments
      - isolate_second_ribosomal_seq
      - isolate_second_ribosomal_seq_type
      - isolate_second_ribosomal_seq_comments
      - isolate_fungal_16s_screening
      - isolate_its_match_unite
      - sample_isolated_from
      - collection_site_or_growth_conditions
    slot_usage:
      # analysis_type has no valid enum value for isolate WGS; suppress the inherited
      # required constraint until a proper value is added to AnalysisTypeEnum in nmdc-schema
      analysis_type:
        required: false
      replicate_group:
        slot_group: jgi_isolate_section
      jgi_samp_id:
        slot_group: jgi_isolate_section
      jgi_sample_name:
        slot_group: jgi_isolate_section
      jgi_seq_project:
        slot_group: jgi_isolate_section
      jgi_seq_project_name:
        slot_group: jgi_isolate_section
      jgi_sample_contact:
        slot_group: jgi_isolate_section
      jgi_project_pi:
        slot_group: jgi_isolate_section
      jgi_proposal_id:
        slot_group: jgi_isolate_section
      nuc_acid_absorb1:
        slot_group: jgi_isolate_section
      nuc_acid_absorb2:
        slot_group: jgi_isolate_section
      nuc_acid_concentration:
        slot_group: jgi_isolate_section
      jgi_sample_volume:
        slot_group: jgi_isolate_section
      cont_type:
        slot_group: jgi_isolate_section
      cont_well:
        slot_group: jgi_isolate_section
      container_name:
        slot_group: jgi_isolate_section
      jgi_sample_format:
        slot_group: jgi_isolate_section
      dnase:
        slot_group: jgi_isolate_section
      biosafety_mat_cat:
        slot_group: jgi_isolate_section
        range: JgiIsolateMaterialKindEnum
      dna_isolate_meth:
        slot_group: jgi_isolate_section
      isolate_single_colony:
        slot_group: jgi_isolate_section
      isolate_known_contaminants:
        slot_group: jgi_isolate_section
      isolate_ribosomal_seq:
        slot_group: jgi_isolate_section
      isolate_ribosomal_seq_type:
        slot_group: jgi_isolate_section
      isolate_ribosomal_seq_comments:
        slot_group: jgi_isolate_section
      isolate_second_ribosomal_seq:
        slot_group: jgi_isolate_section
      isolate_second_ribosomal_seq_type:
        slot_group: jgi_isolate_section
      isolate_second_ribosomal_seq_comments:
        slot_group: jgi_isolate_section
      isolate_fungal_16s_screening:
        slot_group: jgi_isolate_section
      isolate_its_match_unite:
        slot_group: jgi_isolate_section
      sample_isolated_from:
        slot_group: jgi_isolate_section
      collection_site_or_growth_conditions:
        slot_group: jgi_isolate_section
    rules:
      - title: well_requires_plate
        description: If a well is specified, the container type must be a plate.
        preconditions:
          slot_conditions:
            cont_well:
              pattern: ".+"
        postconditions:
          slot_conditions:
            cont_type:
              equals_string: plate
      - title: plate_requires_well
        description: If a plate is specified, a well must be specified.
        preconditions:
          slot_conditions:
            cont_type:
              equals_string: plate
        postconditions:
          slot_conditions:
            cont_well:
              pattern: ^(?!A1$|A12$|H1$|H12$)(([A-H][1-9])|([A-H]1[0-2]))$
      - title: ribosomal_seq_type_other_requires_comments
        description: If the first ribosomal sequence type is Other, comments are required.
        preconditions:
          slot_conditions:
            isolate_ribosomal_seq_type:
              equals_string: Other
        postconditions:
          slot_conditions:
            isolate_ribosomal_seq_comments:
              pattern: ".+"
      - title: second_ribosomal_seq_type_requires_sequence
        description: If a second ribosomal sequence type is provided, the sequence itself must also be provided.
        preconditions:
          slot_conditions:
            isolate_second_ribosomal_seq_type:
              pattern: ".+"
        postconditions:
          slot_conditions:
            isolate_second_ribosomal_seq:
              pattern: ".+"
      - title: second_ribosomal_seq_type_other_requires_comments
        description: If the second ribosomal sequence type is Other, comments are required.
        preconditions:
          slot_conditions:
            isolate_second_ribosomal_seq_type:
              equals_string: Other
        postconditions:
          slot_conditions:
            isolate_second_ribosomal_seq_comments:
              pattern: ".+"

