  dh_section:
    description: dh_section grouping slot
  emsl_section:
    title: EMSL
    rank: 2
    is_a: dh_section
  jgi_metagenomics_section:
    title: JGI-Metagenomics
    rank: 3
    is_a: dh_section
  jgi_metatranscriptomics_section:
    title: JGI-Metatranscriptomics
    rank: 4
    is_a: dh_section
  mixs_core_section:
    title: MIxS Core
    rank: 10
    is_a: dh_section
  mixs_inspired_section:
    title: MIxS Inspired
    rank: 7
    is_a: dh_section
  mixs_investigation_section:
    rank: 8
    is_a: dh_section
  mixs_modified_section:
    title: MIxS (modified)
    rank: 6
    is_a: dh_section
  mixs_nassf_section:
    rank: 9
    is_a: dh_section
  mixs_section:
    title: MIxS
    rank: 5
    is_a: dh_section
  sample_id_section:
    title: Sample ID
    rank: 1
    is_a: dh_section
  sequencing_section:
    title: Sequencing Details
    rank: 11
    is_a: dh_section
  data_files_section:
    title: Data Files
    rank: 12
    is_a: dh_section
  organism_section:
    title: Organism
    rank: 13
    is_a: dh_section
    description: >-
      Biological identity of the isolate organism: free-text genus, species,
      strain, and isolate name, the NCBI taxonomic classification, and the
      estimated genome size. These describe what the organism is, as distinct
      from the JGI submission logistics captured in the JGI Isolate section.
  jgi_isolate_section:
    title: JGI Isolate
    rank: 14
    is_a: dh_section
    description: >-
      JGI submission logistics and quality control for single-organism isolate
      samples: sample and container identifiers, nucleic-acid concentration and
      absorbance readings, strain-verification ribosomal sequences, contaminant
      and fungal screening, and the biosafety material category. These are
      required by JGI for sample handling and are not stored in nmdc-schema.
  read_1_url:
    title: read 1 FASTQ
    description: >-
      URL for FASTQ file of read 1 of a pair of reads.
    comments:
    - If multiple runs were performed, separate each URL with a semi-colon.
    - External data urls should be available for at least a year. If you would like NMDC to submit 
      your data to an appropriate raw data repository on your behalf please contact us at
      microbiomedata.science@gmail.com.
    range: string
    required: true
    slot_group: data_files_section
    rank: 10
    pattern: ^https://[^\s;]+(?:\s*;\s*https://[^\s;]+)*$
  read_1_md5_checksum:
    title: read 1 FASTQ MD5
    description: >-
      MD5 checksum of file in "read 1 FASTQ".
    comments:
    - If multiple runs were performed, separate each checksum with a semi-colon. The number of 
      checksums should match the number of URLs in "read 1 FASTQ".
    range: string
    slot_group: data_files_section
    rank: 11
    pattern: ^[a-fA-F0-9]{32}(?:\s*;\s*[a-fA-F0-9]{32})*$
  read_2_url:
    title: read 2 FASTQ
    description: >-
      URL for FASTQ file of read 2 of a pair of reads.
    comments:
    - If multiple runs were performed, separate each URL with a semi-colon.
    - External data urls should be available for at least a year. If you would like NMDC to submit
      your data to an appropriate raw data repository on your behalf please contact us at
      microbiomedata.science@gmail.com.
    range: string
    required: true
    slot_group: data_files_section
    rank: 12
    pattern: ^https://[^\s;]+(?:\s*;\s*https://[^\s;]+)*$
  read_2_md5_checksum:
    title: read 2 FASTQ MD5
    description: >-
      MD5 checksum of file in "read 2 FASTQ".
    comments:
    - If multiple runs were performed, separate each checksum with a semi-colon. The number of 
      checksums should match the number of URLs in "read 2 FASTQ".
    range: string
    slot_group: data_files_section
    rank: 13
    pattern: ^[a-fA-F0-9]{32}(?:\s*;\s*[a-fA-F0-9]{32})*$
  interleaved_url:
    title: interleaved FASTQ
    description: >-
      URL for FASTQ file of interleaved reads.
    comments:
    - If multiple runs were performed, separate each URL with a semi-colon.
    - External data urls should be available for at least a year. If you would like NMDC to submit
      your data to an appropriate raw data repository on your behalf please contact us at
      microbiomedata.science@gmail.com.
    range: string
    required: true
    slot_group: data_files_section
    rank: 14
    pattern: ^https://[^\s;]+(?:\s*;\s*https://[^\s;]+)*$
  interleaved_md5_checksum:
    title: interleaved FASTQ MD5
    description: >-
      MD5 checksum of file in "interleaved FASTQ".
    comments:
    - If multiple runs were performed, separate each checksum with a semi-colon. The number of 
      checksums should match the number of URLs in "interleaved FASTQ".
    range: string
    slot_group: data_files_section
    rank: 15
    pattern: ^[a-fA-F0-9]{32}(?:\s*;\s*[a-fA-F0-9]{32})*$
  cont_type:
    description: Tube or plate (96-well)
    title: JGI container type
    rank: 11
    range: JgiContTypeEnum
    required: true
    aliases:
      - dna_cont_type
      - rna_cont_type
  replicate_group:
    title: Biological replicate/sample group Name
    description: Samples that are biological replicates should have the same group name.  If your project does not contain biological replicates, give each sample its own group name.
    rank: 5
    range: string
    examples:
      - value: SampleGroup1
  cont_well:
    title: plate position
    comments:
      - Required when 'plate' is selected for container type.
      - Leave blank if the sample will be shipped in a tube.
      - JGI will not process samples in corner wells, so A1, A12, H1 and H12 will not pass validation.
      - Fill plate in column-wise format. B1-G1,A2-H2,A3-D3 (NOT A2-A11,B1-B8).
    examples:
      - value: B2
    rank: 12
    recommended: true
    pattern: ^(?!A1$|A12$|H1$|H12$)(([A-H][1-9])|([A-H]1[0-2]))$
    aliases:
      - dna_cont_well
      - rna_cont_well
  container_name:
    title: container name
    comments:
      - Must be unique across all tubes and plates, and <20 characters. 
      - All samples in a plate should have the same plate name.
    examples:
      - value: Pond_MT_041618
    rank: 10
    required: true
    pattern: ^[-_.a-zA-Z0-9]{1,20}$
    aliases:
      - dna_container_id
      - rna_container_id
  dnase:
    title: DNase treatment
    comments:
      - Note DNase treatment is required for all RNA samples.
    examples:
      - value: 'no'
    rank: 15
    range: YesNoEnum
    required: true
    aliases:
      - dna_dnase
      - dnase_rna
  jgi_samp_id:
    title: JGI sample ID
    comments:
      - Do not edit these values. A template will be provided by NMDC in which these
        values have been pre-filled. If you do not have these values, please contact 
        your NMDC POC & your JGI PM.
    examples:
      - value: '187654'
    rank: 3
    slot_group: jgi_metagenomics_section
    range: string
    required: true
    aliases:
      - dna_samp_id
      - rna_samp_id
  jgi_sample_format:
    description: Solution in which the JGI sample has been suspended
    title: JGI sample format
    examples:
      - value: Water
    rank: 13
    range: JGISampleFormatEnum
    required: true
    aliases:
      - dna_sample_format
      - rna_sample_format
  jgi_sample_name:
    description: Give the JGI sample a name that is meaningful to you. Sample names
      must be unique across all JGI projects and contain a-z, A-Z, 0-9, - and _ only.
    title: JGI sample name
    examples:
      - value: JGI_pond_041618
    rank: 4
    range: string
    required: true
    pattern: ^[-_.a-zA-Z0-9]*$
    aliases:
      - dna_sample_name
      - rna_sample_name
  jgi_seq_project:
    title: JGI seq project ID
    comments:
      - Do not edit these values. A template will be provided by NMDC in which these
        values have been pre-filled. If you do not have these values, please contact 
        your NMDC POC & your JGI PM.
    examples:
      - value: 1191234
    rank: 1
    required: true
    range: float
    aliases:
      - Seq Project ID
      - dna_seq_project 
      - rna_seq_project
  jgi_seq_project_name:
    title: JGI seq project name
    comments:
      - Do not edit these values. A template will be provided by NMDC in which these
        values have been pre-filled. If you do not have these values, please contact 
        your NMDC POC & your JGI PM.
    examples:
      - value: JGI Pond metagenomics
    rank: 2
    required: true
    range: string
    aliases:
      - dna_seq_project_name
      - rna_seq_project_name
  jgi_sample_volume:
    title: JGI sample volume in ul
    comments:
      - Units must be in uL. Enter the numerical part only. Value must be greater than zero and at most 1000.
        This form accepts values < 25, but JGI may refuse to process them unless permission has been granted by a project manager.
    examples:
      - value: 25
    rank: 8
    range: float
    required: true
    minimum_value: 0.0001
    maximum_value: 1000
    aliases:
      - dna_volume
      - rna_volume
  nuc_acid_absorb1:
    description: 260/280 measurement of nucleic acid sample purity
    title: nucleic acid absorbance 260/280
    comments:
      - Recommended value is between 1 and 3.
    examples:
      - value: 2.02
    rank: 7
    range: float
    minimum_value: 0.0001
    recommended: true
    aliases:
      - dna_absorb1
      - rna_absorb1
  nuc_acid_absorb2:
    description: 260/230 measurement of nucleic acid sample purity
    title: nucleic acid absorbance 260/230
    comments:
      - Recommended value is between 1 and 3.
    examples:
      - value: 2.02
    rank: 9
    range: float
    minimum_value: 0.0001
    recommended: true
    aliases:
      - dna_absorb2
      - nuc_acid_absorb2
  nuc_acid_concentration:
    see_also:
      - nmdc:nucleic_acid_concentration
    aliases:
      - dna_concentration
      - rna_concentration
    title: nucleic acid concentration in ng/ul
    comments:
      - Units must be in ng/uL. Enter the numerical part only. Must be calculated using
        a fluorometric method. Acceptable values are greater than zero and at most 2000.
    examples:
      - value: 100
    rank: 6
    range: float
    required: true
    minimum_value: 0.0001
    maximum_value: 2000
  biosafety_mat_cat:
    # JGI calls this "Biosafety Material Category" but the values are organism/material
    # kind (Bacteria, Fungi, etc.), not biosafety levels (BSL-1..4). The label reflects
    # JGI's internal routing use; we keep the slot name to match the JGI form.
    description: >-
      Broad kind of organism or genetic element. JGI uses this field, labeled
      "Biosafety Material Category", for internal routing; values are organism
      categories, not biosafety levels.
    title: JGI Biosafety Material Category
    rank: 17
    range: JGIBiosafetyMaterialCategoryEnum
    required: true
    structured_aliases:
      - literal_form: Biosafety Material Category
        predicate: EXACT_SYNONYM
        source: https://jgi.doe.gov/user-programs/pmo-overview/project-materials-submission-overview/
        notes:
          - Exact JGI form template is access-restricted; source is the public submission overview.
  jgi_sample_contact:
    title: DNA sample contact
    examples:
      - value: Jordan James
    rank: 18
    range: string
    required: true
  jgi_project_pi:
    title: JGI sequencing project PI
    examples:
      - value: Jordan James
    rank: 19
    range: string
    required: true
  jgi_proposal_id:
    title: JGI proposal number
    examples:
      - value: PR123456
      - value: 123456
    rank: 20
    range: string
    pattern: ^[A-Z0-9]+$
    required: true

  ## isolate-specific slots (JGI-only; not stored in nmdc-schema)
  isolate_single_colony:
    title: single colony isolation
    description: Was the sample isolated from a single colony or equivalent axenic/pure culture?
    comments:
      - Answer yes if the sample originated from a single colony pick, single-cell isolation,
        or equivalent process expected to yield a genetically homogeneous culture.
    examples:
      - value: "yes"
    rank: 30
    range: YesNoEnum
    required: true
    aliases:
      - Is the sample isolated from a single colony or equivalent?
  isolate_known_contaminants:
    title: known or suspected organisms
    description: >-
      List any organisms known or suspected to grow in co-culture or that may be
      contaminating the culture, along with an estimate of the percentage.
    comments:
      - Leave blank if no contaminants are known or suspected.
    examples:
      - value: "Bacillus subtilis ~5%"
    rank: 31
    range: string
    recommended: true
    aliases:
      - Known / Suspected Organisms
  isolate_ribosomal_seq:
    title: first ribosomal sequence
    description: >-
      Primary ribosomal sequence for strain verification. For microbial drafts must
      be >1300 nt; for single cells >220 bp with <10% Ns. Use only A, C, G, T, or N
      with no FASTA header line.
    comments:
      - Required for all microbial and fungal genome projects.
      - 16S is required for microbial drafts and single cells; ITS for fungal drafts.
      - Sequence must come from the actual sample to be shipped to JGI.
    examples:
      - value: 
    rank: 32
    range: string
    required: true
    pattern: "^[ATCGN]{200,5000}$"
    aliases:
      - First ribosomal sequence
  isolate_ribosomal_seq_type:
    title: first ribosomal sequence type
    description: Type of the first ribosomal sequence provided.
    examples:
      - value: 16S
    rank: 33
    range: RibosomalSequenceTypeEnum
    required: true
    aliases:
      - First ribosomal sequence type
  isolate_ribosomal_seq_comments:
    title: first ribosomal sequence comments
    description: Additional information about the first ribosomal sequence.
    comments:
      - Required if ribosomal sequence type is Other.
    examples:
      - value: "Partial 16S, 850 nt"
    rank: 34
    range: string
    pattern: "^.{0,256}$"
    aliases:
      - First ribosomal sequence comments
  isolate_second_ribosomal_seq:
    title: second ribosomal sequence
    description: >-
      Optional secondary ribosomal sequence for additional strain verification.
      For 28S must be >300 nt with <10% Ns. Use only A, C, G, T, or N with no
      FASTA header line.
    examples:
      - value: 
    rank: 35
    range: string
    pattern: "^[ATCGN]{200,5000}$"
    aliases:
      - Second ribosomal sequence
  isolate_second_ribosomal_seq_type:
    title: second ribosomal sequence type
    description: Type of the second ribosomal sequence provided.
    examples:
      - value: ITS
    rank: 36
    range: RibosomalSequenceTypeEnum
    aliases:
      - Second ribosomal sequence type
  isolate_second_ribosomal_seq_comments:
    title: second ribosomal sequence comments
    description: Additional information about the second ribosomal sequence.
    comments:
      - Required if second ribosomal sequence type is Other.
    rank: 37
    range: string
    pattern: "^.{0,256}$"
    aliases:
      - Second ribosomal sequence comments
  isolate_fungal_16s_screening:
    title: 16S screening performed
    description: For fungal draft samples only — was 16S screening performed to check for bacterial contamination?
    comments:
      - Required for fungal minimal, standard, and improved drafts.
      - Leave blank for non-fungal samples.
    examples:
      - value: "yes"
    rank: 38
    range: YesNoEnum
    aliases:
      - For fungal draft samples, was 16S screening performed?
  isolate_its_match_unite:
    title: ITS matches UNITE
    description: For fungal draft samples only — does the ITS sequence match taxonomy in the UNITE database?
    comments:
      - Required for fungal minimal, standard, and improved drafts.
      - Screen at https://unite.ut.ee/ before submitting.
      - Leave blank for non-fungal samples.
    examples:
      - value: "yes"
    rank: 39
    range: YesNoEnum
    aliases:
      - For fungal draft samples, does ITS match taxonomy in UNITE?
  sample_isolated_from:
    title: Sample Isolated From
    description: Free-text description of what the organism was isolated from.
    rank: 40
    range: string
    required: true
    examples:
      - value: soil
      - value: leaf
      - value: seawater
      - value: single colony isolate
      - value: DSM 3658
      - value: Sorghum bicolor - root
    structured_aliases:
      - literal_form: Sample Isolated From
        predicate: EXACT_SYNONYM
        source: https://jgi.doe.gov/user-programs/pmo-overview/project-materials-submission-overview/
        notes:
          - Exact JGI form template is access-restricted; source is the public submission overview.
  collection_site_or_growth_conditions:
    title: Collection Site or Growth Conditions
    description: >-
      Free-text description of the collection site or growth conditions for the
      isolate.
    rank: 41
    range: string
    examples:
      - value: Field
      - value: Greenhouse
      - value: Deep well
      - value: Liquid culture from a frozen stock
      - value: JGI grown culture
    structured_aliases:
      - literal_form: Collection Site or Growth Conditions
        predicate: EXACT_SYNONYM
        source: https://jgi.doe.gov/user-programs/pmo-overview/project-materials-submission-overview/
        notes:
          - Exact JGI form template is access-restricted; source is the public submission overview.
    comments:
      - Required for RNA and methylation samples.
  ## data aggregation slots for SampleData
  isolate_data:
    description: aggregation slot relating isolate data collections to a SampleData container
    multivalued: true
    range: IsolateInterface
    inlined: true
    inlined_as_list: true
  jgi_isolate_data:
    description: aggregation slot relating jgi_isolate data collections to a SampleData container
    multivalued: true
    range: JgiIsolateInterface
    inlined: true
    inlined_as_list: true

