## Valid (LinkML) but INVALID (JGI). Microbial DRAFT genome isolate, ribosomal sequence omitted.
## Purpose: document a gap that LinkML cannot catch.
## JGI REQUIRES a ribosomal sequence for draft genome products (16S >1300 nt for microbial
## drafts). This record is a draft genome with NO isolate_ribosomal_seq, so JGI would REJECT
## it. LinkML accepts it because the requirement is product-conditional: analysis_type is the
## coarse "isolate genome sequencing" for both drafts (require ribosomal) and resequencing
## (does not), so LinkML cannot tell them apart. The nmdc-server TypeScript validator is where
## this rule would be enforced.
## This file lives in problem/ because it passes LinkML but is NOT a complete JGI-legal draft
## submission. See src/data/problem/README.md.
