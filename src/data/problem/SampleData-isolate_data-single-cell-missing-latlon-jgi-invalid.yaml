## Passes LinkML, not a valid JGI submission. See src/data/problem/README.md. Tracked in nmdc-server #2176.
## Microbial single-cell isolate genome with no environmental tab. JGI requires Latitude,
## Longitude, Depth, Elevation, and Country for single cells; those live on an environmental tab
## (Soil/Water/Host), absent here. submission-schema has no rule requiring an env tab for
## single-cell products (a cross-tab requirement we have not expressed).
## Also: for single cells JGI wants the 16S sequence >220 bp with <10% Ns; submission-schema
## enforces only the flat 200-5000 pattern.
isolate_data:
  - samp_name: Dtur_DSM6724_sc1
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'DSM 6724'
    collection_date: "2008-05-12"
    organism_genus: Dictyoglomus
    organism_species: turgidum
    strain_name: DSM 6724
    isolate_name: DSM 6724
    classified_as: NCBITaxon:515635
    gc_content: 34.0
    ploidy: haploid
    isolate_single_colony: "yes"
    isolate_known_contaminants: none observed
jgi_isolate_genome_data:
  - samp_name: Dtur_DSM6724_sc1
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'DSM 6724'
    replicate_group: Dtur_DSM6724_repA
    jgi_samp_id: "248024"
    jgi_sample_name: Dtur_DSM6724_sc1
