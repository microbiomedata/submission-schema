## Passes LinkML, but NOT a valid JGI submission. Fungal DRAFT genome isolate missing screening.
## JGI requires isolate_fungal_16s_screening AND isolate_its_match_unite for fungal
## light/minimal/standard/improved drafts. Both are omitted here, so JGI would reject this.
## It passes submission-schema validation: the requirement is conditional on the JGI Sequencing
## Product (a fungal draft). biosafety_mat_cat = Fungi is present, but the product is not, so we
## have not found a way to express this in submission-schema with the current version of LinkML;
## it may need more sophisticated rules, or nmdc-server TypeScript validation
## (web/src/views/SubmissionPortal/validation.ts; tracked in nmdc-server #2177, not yet implemented).
isolate_data:
  - samp_name: Ncra_OR74A_g2
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'FGSC 2489'
    collection_date: "2009-03-18"
    organism_genus: Neurospora
    organism_species: crassa
    strain_name: OR74A
    isolate_name: FGSC 2489
    classified_as: NCBITaxon:5141
    gc_content: 50.0
    ploidy: haploid
    isolate_single_colony: "yes"
    isolate_known_contaminants: none observed
