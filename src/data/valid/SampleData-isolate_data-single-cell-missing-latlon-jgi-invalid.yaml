## Valid (LinkML) but INVALID (JGI). Microbial single-cell isolate genome, no environmental tab.
## JGI requires Latitude, Longitude, Depth, Elevation, and Country for single-cell products.
## Those fields live on an environmental tab (Soil/Water/Host interface), not on the isolate
## tabs. This submission has only the isolate + JGI genome tabs and no environmental tab, so
## the required lat/lon are absent and JGI would reject it. LinkML accepts it because there is
## no schema rule requiring an environmental tab for single-cell products. The nmdc-server
## TypeScript validator (with the geographic fields wired to the env tab) would enforce it.
## Also note: for single cells JGI wants the 16S ribosomal sequence >220 bp with <10% Ns
## (LinkML enforces only the flat 200-5000 pattern).
isolate_data:
  - samp_name: Dtur_DSM6724_sc1
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'DSM 6724'
    collection_date: "2008-05-12"
    organism_genus: Dictyoglomus
    organism_species: turgidum
    strain_name: DSM 6724
    isolate_name: DSM 6724
    classified_as: NCBITaxon:515635
    gc_content: 34.0
    ploidy: haploid
    isolate_single_colony: "yes"
    isolate_known_contaminants: none observed
