## Synthetic exhaustive example for IsolateInterface and JgiIsolateInterface.
## Every slot of both classes is populated, including all optional slots, so this
## file exercises the full isolate field set.
##
## Values are invented for this example. They are NOT taken from the JGI Isolate
## (NA) v19 spreadsheet rows and NOT pulled from the JGI/GOLD data lakehouse.
## The organism is a real species (Pseudomonas putida, NCBITaxon:303, looked up
## via NCBI Taxonomy) with a made-up strain code; the host is Zea mays
## (NCBITaxon:4577). All identifiers, contacts, and measurements are fictional.
##
## The two blocks describe the same physical sample from two views: isolate_data
## populates IsolateInterface, jgi_isolate_data populates JgiIsolateInterface.
isolate_data:
  - samp_name: Pputida_NMDC_EX_001
    analysis_type:
      - isolate genome sequencing
    source_mat_id: igsn:EX0001ABC
    collection_date: "2024-06-15"
    organism_genus: Pseudomonas
    organism_species: putida
    strain_name: NMDC-EX-001
    isolate_name: EX-001
    classified_as: NCBITaxon:303
    host_taxid: NCBITaxon:4577
    estimated_size: 6200
jgi_isolate_data:
  - samp_name: Pputida_NMDC_EX_001
    analysis_type:
      - isolate genome sequencing
    source_mat_id: igsn:EX0001ABC
    replicate_group: Pputida_EX_rep1
    jgi_samp_id: "900001"
    jgi_sample_name: Pputida_NMDC_EX_001
    jgi_seq_project: 1400001
    jgi_seq_project_name: Pseudomonas putida NMDC-EX-001
    jgi_sample_contact: Doe, Jane
    jgi_project_pi: Roe, Richard
    jgi_proposal_id: EX5001
    nuc_acid_absorb1: 1.85
    nuc_acid_absorb2: 2.05
    nuc_acid_concentration: 45.0
    jgi_sample_volume: 30.0
    cont_type: plate
    cont_well: B3
    container_name: PputidaPlate01
    jgi_sample_format: Gentegra-DNA
    dnase: "yes"
    biosafety_mat_cat: Bacteria
    dna_isolate_meth: CTAB chloroform extraction
    isolate_single_colony: "yes"
    isolate_known_contaminants: none observed
    isolate_ribosomal_seq: ATCGATCGATCGAAGGTTCCGGAANNATCG
    isolate_ribosomal_seq_type: 16S
    isolate_ribosomal_seq_comments: Sanger-sequenced 16S amplicon, approximately 1450 bp
    isolate_second_ribosomal_seq: ATCGATCGATCGATCGATCG
    isolate_second_ribosomal_seq_type: ITS
    isolate_second_ribosomal_seq_comments: ITS1-5.8S-ITS2 region
    isolate_fungal_16s_screening: "no"
    isolate_its_match_unite: "no"
