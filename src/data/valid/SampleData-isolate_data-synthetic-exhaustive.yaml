## Synthetic exhaustive example for IsolateInterface and JgiIsolateInterface.
## Organism: Dictyoglomus turgidum DSM 6724 (NCBITaxon:515635, looked up via NCBI
## Taxonomy), a real free-living thermophilic bacterium. The organism identity is
## real; all JGI logistics values (sample/project IDs, contacts, container) are
## invented and are NOT taken from the Pupo spreadsheet rows or the JGI/GOLD data
## lakehouse. estimated_size 1.85 (Mb, float) is D. turgidum's real genome size and
## exercises the float range. Every slot of both classes is populated. host_taxid
## carries an illustrative value to exercise the optional host field; a free-living
## isolate would normally leave it blank.
isolate_data:
  - samp_name: Dturgidum_DSM6724_isolate01
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'DSM 6724'
    collection_date: "2008-05-12"
    organism_genus: Dictyoglomus
    organism_species: turgidum
    strain_name: DSM 6724
    isolate_name: DSM 6724
    classified_as: NCBITaxon:515635
    host_taxid: NCBITaxon:4577
    estimated_size: 1.85
    gc_content: 34.0
    ploidy: haploid
