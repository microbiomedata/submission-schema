## Synthetic exhaustive example for IsolateInterface and JgiIsolateGenomeInterface.
## Organism: Dictyoglomus turgidum DSM 6724 (NCBITaxon:515635), a real free-living
## thermophilic bacterium. Organism identity, ecosystem-derived isolation source
## (GOLD organism_v2: Environmental > Aquatic > Thermal springs), genome size
## (1.85 Mb) and GC (34%) are real. The JGI submission IDs are placeholders shaped
## to match real GOLD project formats (proposal 6-digit, sequencing project
## 7-digit, sample 6-digit); the contact and PI names are obvious placeholders
## (Jane Doe, John Doe). Every slot of both classes is populated.
