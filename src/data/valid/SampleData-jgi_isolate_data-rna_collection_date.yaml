## Valid: JgiIsolateTranscriptomeInterface for an isolate transcriptome project.
## rna_collection_date stores the RNA experiment date as YYYY-MM-DD; the JGI export
## layer splits this into Collection Year, Collection Month (full name), and
## Collection Day columns. The transcriptome interface shares the JGI sample
## logistics but carries no ribosomal strain-verification fields (those are on the
## genome interface). Organism: Dictyoglomus turgidum DSM 6724. JGI logistics values
## are synthetic but shaped to real GOLD `project` formats; non-identifying.
jgi_isolate_transcriptome_data:
  - samp_name: Dtur_DSM6724_rna1
    analysis_type:
      - isolate transcriptome sequencing
    source_mat_id: 'DSM 6724'
    jgi_samp_id: "248040"
    jgi_sample_name: Dtur_DSM6724_rna1
    jgi_seq_project: 1248755
    jgi_seq_project_name: Dictyoglomus turgidum DSM 6724 Isolate Transcriptome
    jgi_sample_contact: Jordan Rivera
    jgi_project_pi: Morgan Avery
    jgi_proposal_id: "505842"
    sample_isolated_from: liquid culture from a frozen stock
    nuc_acid_concentration: 25.0
    jgi_sample_volume: 50.0
    cont_type: tube
    container_name: DturRnaTube01
    jgi_sample_format: RNAStable
    dnase: "yes"
    biosafety_mat_cat: Bacteria
    dna_isolate_meth: TRIzol RNA extraction
    rna_collection_date: "2021-06-15"
