## Valid: JgiIsolateInterface with rna_collection_date for a transcriptome project.
## rna_collection_date stores the RNA experiment date as YYYY-MM-DD; the JGI
## export layer splits this into Collection Year, Collection Month (full name),
## and Collection Day columns.
jgi_isolate_data:
  - samp_name: test_isolate_rna_001
    analysis_type:
      - metagenomics
    source_mat_id: igsn:000
    ## --- JGI project identifiers (placeholder values) ---
    jgi_samp_id: "999001"
    jgi_sample_name: test_isolate_rna_001
    jgi_seq_project: 9990001
    jgi_seq_project_name: Test RNA Isolate Project
    ## --- DNA/RNA quality ---
    nuc_acid_concentration: 25.0
    jgi_sample_volume: 50
    ## --- Container ---
    cont_type: tube
    container_name: test_tube_rna_001
    jgi_sample_format: TE
    dnase: "yes"
    ## --- Biosafety and extraction ---
    biosafety_mat_cat: Bacteria
    dna_isolate_meth: CTAB
    ## --- Isolate verification ---
    isolate_single_colony: "yes"
    isolate_ribosomal_seq: 
    isolate_ribosomal_seq_type: 16S
    ## --- RNA experiment date ---
    rna_collection_date: "2021-06-15"
