## Valid (LinkML) and valid (JGI). Microbial RESEQUENCING isolate.
## Purpose: show that a ribosomal sequence is NOT required for resequencing products.
## JGI requires a ribosomal sequence only for DRAFT genome products; for resequencing it
## is not required, so isolate_ribosomal_seq / isolate_ribosomal_seq_type are absent here
## and the record validates. (Before this change those slots were required: true, which
## wrongly rejected legitimate resequencing submissions.)
##
## NOT LinkML-validatable (would need the nmdc-server TypeScript validator):
##   - reference_genome is REQUIRED by JGI for resequencing products. It is present below,
##     but LinkML cannot enforce "required for resequencing" because analysis_type is the
##     coarse "isolate genome sequencing" for both draft and resequencing products.
## IDs/organism follow the synthetic Dictyoglomus turgidum DSM 6724 example.
isolate_data:
  - samp_name: Dtur_DSM6724_reseq1
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'DSM 6724'
    collection_date: "2008-05-12"
    organism_genus: Dictyoglomus
    organism_species: turgidum
    strain_name: DSM 6724
    isolate_name: DSM 6724
    classified_as: NCBITaxon:515635
    gc_content: 34.0
    ploidy: haploid
    isolate_single_colony: "yes"
    isolate_known_contaminants: none observed
jgi_isolate_genome_data:
  - samp_name: Dtur_DSM6724_reseq1
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'DSM 6724'
    replicate_group: Dtur_DSM6724_repA
    jgi_samp_id: "248018"
    jgi_sample_name: Dtur_DSM6724_reseq1
    jgi_seq_project: 1248702
    jgi_seq_project_name: Dictyoglomus turgidum DSM 6724 Resequencing
    jgi_sample_contact: Jane Doe
    jgi_project_pi: John Doe
    jgi_proposal_id: "505831"
    sample_isolated_from: thermal spring
    nuc_acid_concentration: 45.0
    jgi_sample_volume: 30.0
    cont_type: plate
    cont_well: B3
    container_name: DturReseqPlate01
    jgi_sample_format: Gentegra-DNA
    dnase: "yes"
    biosafety_mat_cat: Bacteria
    dna_isolate_meth: CTAB chloroform extraction
    reference_genome: "2648501807"
    estimated_size: 1.85
