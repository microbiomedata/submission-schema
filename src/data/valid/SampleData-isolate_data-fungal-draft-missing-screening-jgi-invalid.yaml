## Valid (LinkML) but INVALID (JGI). Fungal DRAFT genome isolate missing fungal screening.
## JGI requires isolate_fungal_16s_screening AND isolate_its_match_unite for fungal
## light/minimal/standard/improved drafts. Both are omitted here, so JGI would reject this.
## LinkML accepts it: the requirement is conditional on the sample being a fungal draft, which
## the schema cannot determine (biosafety_mat_cat = Fungi is present, but the schema has no
## rule tying "Fungi + draft product" to these two fields). The nmdc-server TypeScript
## validator is where this would be enforced.
isolate_data:
  - samp_name: Ncra_OR74A_g2
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'FGSC 2489'
    collection_date: "2009-03-18"
    organism_genus: Neurospora
    organism_species: crassa
    strain_name: OR74A
    isolate_name: FGSC 2489
    classified_as: NCBITaxon:5141
    gc_content: 50.0
    ploidy: haploid
    isolate_single_colony: "yes"
    isolate_known_contaminants: none observed
jgi_isolate_genome_data:
  - samp_name: Ncra_OR74A_g2
    analysis_type:
      - isolate genome sequencing
    source_mat_id: 'FGSC 2489'
    replicate_group: Ncra_OR74A_repA
    jgi_samp_id: "248052"
    jgi_sample_name: Ncra_OR74A_g2
    jgi_seq_project: 1248772
    jgi_seq_project_name: Neurospora crassa OR74A Fungal Improved Draft
    jgi_sample_contact: Jane Doe
    jgi_project_pi: John Doe
    jgi_proposal_id: "505855"
    sample_isolated_from: fungal mycelium from agar slant
    nuc_acid_absorb1: 1.90
    nuc_acid_absorb2: 2.10
    nuc_acid_concentration: 60.0
    jgi_sample_volume: 40.0
    cont_type: plate
