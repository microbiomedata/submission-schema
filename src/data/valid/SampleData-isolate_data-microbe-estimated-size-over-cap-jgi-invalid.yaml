## Valid (LinkML) but INVALID (JGI). Microbial draft isolate with an over-cap estimated_size.
## JGI caps estimated genome size at 5000 Mb for microbial categories (Archaea, Bacteria,
## Fungi, Plasmid, Virus, Synthetic Construct) and 100000 Mb for eukaryotes (Alga, Animal,
## Plant, Protist). This Bacteria record declares estimated_size: 6000, which exceeds the
## microbial cap, so JGI would reject it. LinkML only enforces the outer 0-100000 bound
## (maximum_value: 100000), so 6000 passes; the category-conditional 5000 cap depends on
## biosafety_mat_cat and is not expressible in LinkML. The nmdc-server TypeScript validator
## is where this would be enforced.
